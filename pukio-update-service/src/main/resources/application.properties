# Pukio Update Service Configuration
# This file uses placeholders ${VAR} — actual values in application-secrets.properties

# Database configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Initialize schema on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-e1.sql

# TCP Server configuration
pukio.server.port=${SERVER_PORT}
pukio.store.id=${STORE_ID}

# Logging
logging.level.com.pukio.update=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
