# H2 in-memory database for integration tests only (TASK-E1-47)
# This file is safe to commit — no real credentials

spring.datasource.url=jdbc:h2:mem:pukio_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-e1.sql

# Test server configuration
pukio.server.port=9999
pukio.store.id=STORE-TEST

# Logging
logging.level.com.pukio.update=DEBUG
