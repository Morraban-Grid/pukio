# Pukio Maintenance System Configuration
# File paths for indexed file storage (REQ 7.2 - using placeholders)

# Product indexed file path (without extension)
pukio.files.products=${PUKIO_FILES_PRODUCTS:/tmp/pukio/products}

# Inventory indexed file path (without extension)
pukio.files.inventory=${PUKIO_FILES_INVENTORY:/tmp/pukio/inventory}

# Spring Boot configuration
spring.application.name=pukio-maintenance
logging.level.com.pukio=INFO
spring.config.import=optional:classpath:application-secrets.properties
