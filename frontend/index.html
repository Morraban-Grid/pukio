<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUKIO - Iniciar Sesión</title>
    
    <!-- Hojas de Estilo -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/views/login.css">
</head>
<body>
    <div id="login-container">
        <!-- Tarjeta de Login Glassmorphism -->
        <main class="login-card">
            <header class="login-header">
                <div class="logo-icon-large">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="9"></line><line x1="9" y1="13" x2="15" y2="13"></line><line x1="9" y1="17" x2="13" y2="17"></line></svg>
                </div>
                <h1>PUKIO <span class="logo-highlight">WEB</span></h1>
                <p>Sistema de Punto de Venta</p>
            </header>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" id="username" class="form-input" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-input" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-orange btn-full-width">
                    INGRESAR
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                </button>
            </form>
            
            <footer class="login-footer">
                <p>PUKIO POS v1.0.0 &copy; 2026</p>
            </footer>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/views/login.js"></script>
</body>
</html>
