# Pukio POS Client — Application Configuration
# File paths for indexed file stores (injected via ${VAR} placeholders)

# Product indexed file path
pukio.files.products=${PUKIO_FILES_PRODUCTS}

# Inventory indexed file path
pukio.files.inventory=${PUKIO_FILES_INVENTORY}

# Sales indexed file path
pukio.files.sales=${PUKIO_FILES_SALES}

# Application Server URL (Entregable 2+)
app.server.url=${APP_SERVER_URL:http://localhost:8080}

# Server port configuration
server.port=8081

# Logging configuration
logging.level.com.pukio.pos=DEBUG
logging.level.com.pukio.common=DEBUG
spring.config.import=optional:classpath:application-secrets.properties
