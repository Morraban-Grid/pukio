# ============================================================
# Pukio Application Server Configuration
# ============================================================
# IMPORTANTE: Este archivo NO contiene valores sensibles.
# Todos los valores sensibles (contraseñas, tokens) están en
# application-secrets.properties (que NO se sube a Git).
# ============================================================

# ============================================================
# Config Import — Load application-secrets.properties
# ============================================================
spring.config.import=optional:classpath:application-secrets.properties

# ============================================================
# Server Configuration
# ============================================================
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ============================================================
# Database Configuration (PostgreSQL 18.1)
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# HikariCP Connection Pool Configuration
# ============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=PukioHikariPool

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.pukio=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================
# Analytics Database Configuration (PostgreSQL 18.1 — Data Warehouse)
# ============================================================
analytics.datasource.url=${ANALYTICS_DB_URL}
analytics.datasource.username=${ANALYTICS_DB_USERNAME}
analytics.datasource.password=${ANALYTICS_DB_PASSWORD}
analytics.datasource.driver-class-name=org.postgresql.Driver

# Analytics HikariCP Pool Configuration
analytics.datasource.hikari.maximum-pool-size=5
analytics.datasource.hikari.minimum-idle=1
analytics.datasource.hikari.connection-timeout=20000
analytics.datasource.hikari.idle-timeout=300000
analytics.datasource.hikari.max-lifetime=1200000

# ============================================================
# Application Configuration
# ============================================================
spring.application.name=pukio-app-server
