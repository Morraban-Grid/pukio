# ==============================================================================
# Pukio Application Server — Development Profile
# ==============================================================================
# Este perfil se activa con: spring.profiles.active=dev
# o en línea de comandos: --spring.profiles.active=dev

# ===== Configuración de Base de Datos Transaccional =====
# Mostrar SQL en consola para debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Validar esquema sin modificar (ddl-auto=validate)
spring.jpa.hibernate.ddl-auto=validate

# Dialecto de PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Configuración de Logging =====
# Nivel de log DEBUG para el paquete com.pukio
logging.level.com.pukio=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===== Configuración del Servidor =====
# Puerto por defecto para desarrollo
server.port=8080

# ===== Configuración de HikariCP (Pool Transaccional) =====
# Pool pequeño para desarrollo local
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ===== Configuración del Data Warehouse (Analytics) =====
# Pool muy pequeño para desarrollo
analytics.datasource.hikari.maximum-pool-size=2
analytics.datasource.hikari.minimum-idle=1

# ===== Configuración de Async =====
# Habilitar async para ETL incluso en dev
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=10

# ===== Configuración de Actuator (Monitoreo) =====
# Exponer todos los endpoints para debugging
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===== Otros =====
# Formato de fechas
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=America/Lima
