# ==============================================================================
# Pukio Application Server — Production Profile
# ==============================================================================
# Este perfil se activa con: spring.profiles.active=prod
# o en línea de comandos: --spring.profiles.active=prod

# ===== Configuración de Base de Datos Transaccional =====
# NO mostrar SQL en producción
spring.jpa.show-sql=false

# Validar esquema sin modificar (ddl-auto=validate)
spring.jpa.hibernate.ddl-auto=validate

# Dialecto de PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Configuración de Logging =====
# Nivel de log INFO para producción
logging.level.com.pukio=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Log a archivo en producción
logging.file.name=logs/pukio-app-server.log
logging.file.max-size=10MB
logging.file.max-history=30

# ===== Configuración del Servidor =====
# Puerto desde variable de entorno o default 8080
server.port=${SERVER_PORT:8080}

# Timeout de conexión HTTP (30 segundos)
server.tomcat.connection-timeout=30000

# Threads máximos de Tomcat
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# ===== Configuración de HikariCP (Pool Transaccional) =====
# Pool de producción con mayor capacidad
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== Configuración del Data Warehouse (Analytics) =====
# Pool de producción para DW
analytics.datasource.hikari.maximum-pool-size=5
analytics.datasource.hikari.minimum-idle=1
analytics.datasource.hikari.connection-timeout=20000
analytics.datasource.hikari.idle-timeout=300000

# ===== Configuración de Async =====
# Pool más grande para ETL en producción
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=etl-async-

# ===== Configuración de Actuator (Monitoreo) =====
# Exponer solo endpoints necesarios en producción
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# ===== Otros =====
# Formato de fechas
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=America/Lima

# Compresión HTTP
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
