# Pukio Send Service Configuration
# This file contains non-sensitive configuration with placeholders for secrets

# Server connection (values injected from application-secrets.properties)
pukio.server.host=${SERVER_HOST}
pukio.server.port=${SERVER_PORT}

# Local indexed file paths (values injected from application-secrets.properties)
pukio.files.products=${PUKIO_FILES_PRODUCTS}
pukio.files.inventory=${PUKIO_FILES_INVENTORY}

# Logging
logging.level.com.pukio.send=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
spring.config.import=optional:classpath:application-secrets.properties
